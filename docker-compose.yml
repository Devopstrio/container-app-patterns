version: '3.8'

services:
  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  sample-api:
    build: ./apps/sample-microservices
    environment:
      DB_URL: postgres://postgres:postgres@db:5432/sample_db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sample_db
    ports:
      - "5432:5432"
